name: CI/CD

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/v') }}

permissions:
  contents: read

jobs:
  build:
    name: Build PocketBook App
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        run: |
          VERSION_CODE="$GITHUB_RUN_NUMBER"
          BUILD_ID="$GITHUB_SHA"
          RELEASED_AT="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"

          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            TAG="$GITHUB_REF_NAME"
            if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
              echo "::error::Release tag must use SemVer with a leading v, for example v1.0.0."
              exit 1
            fi
            VERSION_NAME="${TAG#v}"
            ARTIFACT_SUFFIX="$TAG"
          else
            VERSION_NAME="0.0.0-${GITHUB_SHA::12}"
            ARTIFACT_SUFFIX="${GITHUB_SHA}"
          fi

          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"
          echo "build_id=$BUILD_ID" >> "$GITHUB_OUTPUT"
          echo "released_at=$RELEASED_AT" >> "$GITHUB_OUTPUT"
          echo "artifact_suffix=$ARTIFACT_SUFFIX" >> "$GITHUB_OUTPUT"

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./...

      - name: Build PocketBook binary
        run: |
          docker run --rm \
            -v "$GITHUB_WORKSPACE":/src \
            -w /src \
            --net=host \
            5keeve/pocketbook-go-sdk:6.3.0-b288-v1 \
            build \
              -ldflags "-X pb-ftp/internal/version.VersionName=${{ steps.version.outputs.version_name }} -X pb-ftp/internal/version.VersionCode=${{ steps.version.outputs.version_code }} -X pb-ftp/internal/version.BuildTime=${{ steps.version.outputs.released_at }} -X pb-ftp/internal/version.BuildID=${{ steps.version.outputs.build_id }}" \
              -o pb-ftp.app ./cmd/app

      - name: Prepare package
        id: package
        run: |
          ARTIFACT_SUFFIX="${{ steps.version.outputs.artifact_suffix }}"
          PACKAGE_NAME="pb-ftp-${ARTIFACT_SUFFIX}.tar.gz"
          UPDATE_APP_NAME="pb-ftp.app"

          mkdir -p release-artifacts/package
          cp pb-ftp.app release-artifacts/package/
          cp assets/vsftpd release-artifacts/package/
          cp assets/vsftpd.conf release-artifacts/package/
          tar -czf "release-artifacts/${PACKAGE_NAME}" -C release-artifacts/package .
          cp pb-ftp.app "release-artifacts/${UPDATE_APP_NAME}"

          echo "package_name=${PACKAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "update_app_name=${UPDATE_APP_NAME}" >> "$GITHUB_OUTPUT"

      - name: Generate update manifest
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION_NAME="${{ steps.version.outputs.version_name }}"
          VERSION_CODE="${{ steps.version.outputs.version_code }}"
          BUILD_ID="${{ steps.version.outputs.build_id }}"
          RELEASED_AT="${{ steps.version.outputs.released_at }}"
          PACKAGE_NAME="${{ steps.package.outputs.package_name }}"
          UPDATE_APP_NAME="${{ steps.package.outputs.update_app_name }}"
          ARTIFACT_DIR="release-artifacts"
          SITE_DIR="site/updates"
          RELEASE_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}"
          REPO_OWNER="${GITHUB_REPOSITORY_OWNER,,}"
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          PAGES_URL="https://${REPO_OWNER}.github.io/${REPO_NAME}/updates"

          mkdir -p "$SITE_DIR"
          mkdir -p "$SITE_DIR/changelog"
          cp "$ARTIFACT_DIR/$UPDATE_APP_NAME" "$SITE_DIR/$UPDATE_APP_NAME"
          cp CHANGELOG.md "$SITE_DIR/changelog/CHANGELOG.md"
          cp CHANGELOG.ru.md "$SITE_DIR/changelog/CHANGELOG.ru.md"

          cat > "$SITE_DIR/latest.json" <<EOF
          {
            "schemaVersion": 1,
            "appName": "pb-ftp",
            "versionName": "$VERSION_NAME",
            "versionCode": $VERSION_CODE,
            "buildId": "$BUILD_ID",
            "releasedAt": "$RELEASED_AT",
            "changelogUrl": "$PAGES_URL/changelog/CHANGELOG.md",
            "changelogUrls": {
              "en": "$PAGES_URL/changelog/CHANGELOG.md",
              "ru": "$PAGES_URL/changelog/CHANGELOG.ru.md"
            },
            "artifacts": [
              {
                "type": "launcher",
                "fileName": "$UPDATE_APP_NAME",
                "installPath": "/mnt/ext1/applications/pb-ftp.app",
                "url": "$PAGES_URL/$UPDATE_APP_NAME",
                "sha256": "$(sha256sum "$ARTIFACT_DIR/$UPDATE_APP_NAME" | cut -d ' ' -f 1)",
                "sizeBytes": $(stat -c%s "$ARTIFACT_DIR/$UPDATE_APP_NAME")
              },
              {
                "type": "package",
                "fileName": "$PACKAGE_NAME",
                "url": "$RELEASE_URL/$PACKAGE_NAME",
                "sha256": "$(sha256sum "$ARTIFACT_DIR/$PACKAGE_NAME" | cut -d ' ' -f 1)",
                "sizeBytes": $(stat -c%s "$ARTIFACT_DIR/$PACKAGE_NAME")
              }
            ]
          }
          EOF

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: pb-ftp-artifacts
          path: release-artifacts/*
          if-no-files-found: error
          retention-days: 14

      - name: Upload Pages artifact
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

  release:
    name: Publish Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    permissions:
      contents: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: pb-ftp-artifacts
          path: release-artifacts

      - name: Prepare release notes
        run: |
          TAG="${GITHUB_REF_NAME}"
          REPO_OWNER="${GITHUB_REPOSITORY_OWNER,,}"
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          APP_NAME="pb-ftp.app"
          PAGES_URL="https://${REPO_OWNER}.github.io/${REPO_NAME}/updates"

          cat > release-artifacts/release-notes.md <<EOF
          ## PocketBook launcher

          - [${APP_NAME}](${PAGES_URL}/${APP_NAME})
          EOF

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3.0.1
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          files: |
            release-artifacts/pb-ftp-${{ github.ref_name }}.tar.gz
          body_path: release-artifacts/release-notes.md
          generate_release_notes: true
          fail_on_unmatched_files: true
          overwrite_files: true

  deploy-pages:
    name: Deploy Update Manifest
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: startsWith(github.ref, 'refs/tags/v')
    needs: release
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
